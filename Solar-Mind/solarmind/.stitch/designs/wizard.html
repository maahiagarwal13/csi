<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary": "#8fd5ff",
              "on-secondary-container": "#5a4100",
              "surface-container-highest": "#303443",
              "error": "#ffb4ab",
              "on-error-container": "#ffdad6",
              "on-surface": "#dee2f5",
              "surface-variant": "#303443",
              "secondary-fixed-dim": "#f9bd22",
              "on-tertiary": "#00344a",
              "on-tertiary-container": "#004966",
              "on-primary": "#472a00",
              "outline-variant": "#534434",
              "outline": "#a08e7a",
              "inverse-on-surface": "#2b303e",
              "surface-container-low": "#161b29",
              "surface-container": "#1a1f2d",
              "primary": "#ffc174",
              "on-secondary": "#402d00",
              "on-primary-container": "#613b00",
              "inverse-surface": "#dee2f5",
              "surface-container-high": "#252a38",
              "on-primary-fixed": "#2a1700",
              "inverse-primary": "#855300",
              "background": "#0e1320",
              "surface-container-lowest": "#090e1b",
              "primary-fixed-dim": "#ffb95f",
              "on-surface-variant": "#d8c3ad",
              "primary-fixed": "#ffddb8",
              "error-container": "#93000a",
              "surface-bright": "#343948",
              "primary-container": "#f59e0b",
              "tertiary-fixed-dim": "#7fd0ff",
              "on-background": "#dee2f5",
              "on-tertiary-fixed": "#001e2d",
              "on-primary-fixed-variant": "#653e00",
              "secondary-fixed": "#ffdf9f",
              "tertiary-fixed": "#c5e7ff",
              "secondary-container": "#e3aa00",
              "secondary": "#ffc640",
              "on-error": "#690005",
              "on-secondary-fixed-variant": "#5c4300",
              "tertiary-container": "#1abdff",
              "surface-tint": "#ffb95f",
              "on-tertiary-fixed-variant": "#004c6a",
              "on-secondary-fixed": "#261a00",
              "surface": "#0e1320",
              "surface-dim": "#0e1320"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .solar-glow {
            background: radial-gradient(circle at top center, rgba(255, 193, 116, 0.15) 0%, rgba(14, 19, 32, 0) 70%);
        }
        .glass-panel {
            backdrop-filter: blur(20px);
            background: rgba(22, 27, 41, 0.7);
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col selection:bg-primary/30">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 w-full z-50 bg-[#0e1320]/70 backdrop-blur-xl">
<div class="flex items-center justify-between px-6 h-16 w-full max-w-7xl mx-auto">
<div class="text-2xl font-bold bg-gradient-to-br from-[#ffc174] to-[#f59e0b] bg-clip-text text-transparent font-['Inter'] tracking-tighter">
                SolarMind
            </div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#ffc174] hover:opacity-80 transition-opacity active:scale-95 duration-200 cursor-pointer" data-icon="account_circle">account_circle</span>
</div>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-grow pt-24 pb-32 px-4 solar-glow relative">
<div class="max-w-3xl mx-auto w-full">
<!-- Step Progress Indicator -->
<div class="flex items-center justify-between mb-12 px-2">
<!-- Step 1: Active -->
<div class="flex flex-col items-center gap-3">
<div class="w-12 h-12 rounded-full bg-gradient-to-br from-primary to-primary-container flex items-center justify-center shadow-[0_0_20px_rgba(255,193,116,0.3)]">
<span class="text-on-primary font-bold">1</span>
</div>
<span class="text-primary text-[10px] uppercase tracking-widest font-bold">Energy</span>
</div>
<div class="flex-grow h-[2px] mx-4 bg-surface-container-highest mb-8"></div>
<!-- Step 2: Inactive -->
<div class="flex flex-col items-center gap-3 opacity-40">
<div class="w-12 h-12 rounded-full border-2 border-outline-variant flex items-center justify-center">
<span class="text-on-surface-variant font-bold">2</span>
</div>
<span class="text-on-surface-variant text-[10px] uppercase tracking-widest font-bold">Location</span>
</div>
<div class="flex-grow h-[2px] mx-4 bg-surface-container-highest mb-8"></div>
<!-- Step 3: Inactive -->
<div class="flex flex-col items-center gap-3 opacity-40">
<div class="w-12 h-12 rounded-full border-2 border-outline-variant flex items-center justify-center">
<span class="text-on-surface-variant font-bold">3</span>
</div>
<span class="text-on-surface-variant text-[10px] uppercase tracking-widest font-bold">Roof</span>
</div>
</div>
<!-- Content Card -->
<div class="bg-surface-container-low rounded-lg p-8 md:p-12 shadow-2xl relative overflow-hidden group">
<!-- Decorative Subtle Light Leak -->
<div class="absolute -top-24 -right-24 w-64 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="relative z-10">
<h1 class="text-3xl md:text-4xl font-bold tracking-tighter mb-2 text-on-surface">
                        Build Your <span class="bg-gradient-to-r from-primary to-primary-container bg-clip-text text-transparent">Solar Plan</span>
</h1>
<div class="flex items-center gap-2 mb-10">
<span class="material-symbols-outlined text-primary text-xl" data-icon="bolt">bolt</span>
<h2 class="text-on-surface-variant font-label tracking-wide uppercase text-sm font-bold">Monthly Electricity Consumption</h2>
</div>
<!-- Mode Toggle Tabs -->
<div class="flex bg-surface-container-highest p-1.5 rounded-full w-fit mb-8">
<button class="px-6 py-2.5 rounded-full bg-primary text-on-primary font-bold text-sm shadow-lg transition-all active:scale-95">
                            Upload Bill
                        </button>
<button class="px-6 py-2.5 rounded-full text-on-surface-variant hover:text-on-surface transition-colors text-sm font-bold">
                            Manual Entry
                        </button>
</div>
<!-- Upload Zone -->
<div class="border-2 border-dashed border-outline-variant/30 bg-surface-container rounded-lg p-12 mb-8 flex flex-col items-center justify-center transition-all hover:border-primary/50 group/upload cursor-pointer">
<div class="w-16 h-16 rounded-full bg-surface-container-high flex items-center justify-center mb-4 group-hover/upload:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="cloud_upload">cloud_upload</span>
</div>
<p class="text-on-surface font-semibold mb-1">Drop your electricity bill here</p>
<p class="text-on-surface-variant text-sm">Supports PDF, JPG, PNG (Max 10MB)</p>
</div>
<!-- Manual Input Fallback -->
<div class="space-y-2">
<label class="block text-on-surface-variant text-[10px] uppercase tracking-widest font-bold px-1">Average Monthly Usage (kWh)</label>
<div class="relative group">
<input class="w-full bg-surface-container-highest border-none rounded-DEFAULT py-4 px-6 text-on-surface placeholder:text-outline focus:ring-1 focus:ring-primary transition-all appearance-none" placeholder="e.g. 450" type="number"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-bold text-sm">kWh</div>
</div>
</div>
</div>
</div>
<!-- Footer Navigation -->
<div class="mt-8 flex items-center justify-between">
<button class="px-8 py-3 rounded-full text-primary-fixed-dim font-bold border border-outline-variant/30 hover:bg-surface-container-low transition-colors active:scale-95">
                    Back
                </button>
<button class="bg-gradient-to-r from-primary to-primary-container px-10 py-3 rounded-full text-on-primary font-bold shadow-[0_4px_20px_rgba(245,158,11,0.2)] flex items-center gap-2 hover:opacity-90 transition-all active:scale-95 group">
                    Continue
                    <span class="material-symbols-outlined transition-transform group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
</main>
<!-- Bottom Navigation Shell (Desktop Hidden) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full h-20 bg-[#0e1320] flex justify-around items-center px-4 pb-safe z-50 shadow-[0_-8px_24px_-12px_rgba(255,193,116,0.15)] rounded-t-2xl">
<a class="flex flex-col items-center justify-center text-[#ffc174] scale-110" href="#">
<span class="material-symbols-outlined" data-icon="bolt" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-bold">Energy</span>
</a>
<a class="flex flex-col items-center justify-center text-[#d8c3ad] opacity-50 hover:text-[#ffc174] transition-all" href="#">
<span class="material-symbols-outlined" data-icon="location_on">location_on</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-bold">Location</span>
</a>
<a class="flex flex-col items-center justify-center text-[#d8c3ad] opacity-50 hover:text-[#ffc174] transition-all" href="#">
<span class="material-symbols-outlined" data-icon="home_work">home_work</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-bold">Roof</span>
</a>
</nav>
<!-- Side Decoration (Editorial Asymmetry) -->
<div class="fixed left-12 bottom-12 hidden xl:block pointer-events-none opacity-20">
<div class="text-[120px] font-bold text-outline-variant/10 select-none leading-none tracking-tighter">
            01
        </div>
<div class="h-1 w-24 bg-primary mt-4"></div>
<p class="text-on-surface-variant font-label tracking-widest uppercase text-xs mt-4">System Configuration Phase</p>
</div>
</body></html>
